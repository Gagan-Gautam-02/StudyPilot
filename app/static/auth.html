<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — AgentX StudyPilot</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #050a18;
            --glass: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.1);
            --accent: #7c3aed;
            --accent2: #06b6d4;
            --text: #f1f5f9;
            --muted: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated blobs */
        .blob { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.25; animation: drift 12s infinite alternate ease-in-out; z-index: 0; }
        .blob.one { width: 500px; height: 500px; background: radial-gradient(circle, #7c3aed, #4f46e5); top: -150px; left: -150px; }
        .blob.two { width: 400px; height: 400px; background: radial-gradient(circle, #06b6d4, #0891b2); bottom: -100px; right: -100px; animation-delay: -6s; }
        @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(40px, 30px) scale(1.1); } }

        /* Back link */
        .back-link {
            position: fixed;
            top: 24px;
            left: 28px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
            z-index: 10;
        }
        .back-link:hover { color: var(--text); }

        /* Brand */
        .brand {
            position: fixed;
            top: 22px;
            right: 28px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            z-index: 10;
        }
        .brand span { color: var(--accent); }

        /* Card */
        .auth-card {
            position: relative;
            z-index: 1;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px);
            border-radius: 24px;
            padding: 44px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.5);
            animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes popIn { from { opacity: 0; transform: translateY(20px) scale(0.97); } to { opacity: 1; transform: none; } }

        .auth-header { text-align: center; margin-bottom: 28px; }
        .auth-header .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px; height: 52px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 14px;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 14px;
            box-shadow: 0 8px 24px rgba(124,58,237,0.4);
        }
        .auth-header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
        .auth-header p { color: var(--muted); font-size: 0.92rem; }

        /* Tabs */
        .tab-switcher {
            display: flex;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 9px;
            cursor: pointer;
            transition: all 0.25s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: white;
            box-shadow: 0 4px 16px rgba(124,58,237,0.4);
        }

        /* Form */
        .auth-form { display: flex; flex-direction: column; gap: 14px; }

        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 0.85rem; color: var(--muted); font-weight: 500; }
        .input-group input {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 13px 16px;
            border-radius: 12px;
            color: var(--text);
            font-size: 0.98rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        .input-group input:focus {
            border-color: var(--accent);
            background: rgba(124,58,237,0.08);
        }

        .submit-btn {
            margin-top: 6px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 6px 20px rgba(124,58,237,0.35);
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(124,58,237,0.5); }
        .submit-btn:active { transform: translateY(0); }

        /* Error */
        .error-msg {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.88rem;
            display: none;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--muted);
            font-size: 0.82rem;
            margin: 6px 0;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--glass-border); }

        /* Google button */
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 13px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: white;
            color: #1e293b;
            font-family: inherit;
            font-size: 0.97rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .google-btn:hover { background: #f8fafc; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }

        /* Already logged in state */
        .logged-in-box {
            display: none;
            flex-direction: column;
            gap: 12px;
            text-align: center;
        }
        .logged-in-box .avatar-big { font-size: 3rem; }
        .logged-in-box p { color: var(--muted); font-size: 0.9rem; }
        .logged-in-box strong { color: var(--text); }

        .dash-btn {
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
        }
        .logout-link {
            color: var(--muted);
            font-size: 0.88rem;
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
            font-family: inherit;
        }
        .logout-link:hover { color: #fca5a5; }
    </style>
</head>
<body>
    <div class="blob one"></div>
    <div class="blob two"></div>

    <a href="/" class="back-link">
        ← Back to Home
    </a>
    <div class="brand"><span>X</span> AgentX</div>

    <div class="auth-card">
        <!-- Already logged in view -->
        <div class="logged-in-box" id="logged-in-view">
            <div class="avatar-big">👨‍🎓</div>
            <div>
                <p>Welcome back,</p>
                <strong id="logged-in-email"></strong>
            </div>
            <button class="dash-btn" onclick="window.location.href='app.html'">Enter Dashboard →</button>
            <button class="logout-link" id="logout-link-btn">Sign out</button>
        </div>

        <!-- Auth forms view -->
        <div id="auth-view">
            <div class="auth-header">
                <div class="logo-icon">X</div>
                <h1>Welcome to StudyPilot</h1>
                <p>Your AI-powered study companion</p>
            </div>

            <div class="tab-switcher">
                <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Log In</button>
                <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <div id="error-box" class="error-msg"></div>

            <!-- Login Form -->
            <form class="auth-form" id="login-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="submit-btn">Log In</button>
            </form>

            <!-- Signup Form -->
            <form class="auth-form" id="signup-form" style="display:none;">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="signup-email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" placeholder="Create a strong password" required>
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signup-confirm" placeholder="Repeat password" required>
                </div>
                <button type="submit" class="submit-btn">Create Account</button>
            </form>

            <div class="divider">or continue with</div>

            <a href="#" class="google-btn" id="google-btn">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Sign in with Google
            </a>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            const isLogin = tab === 'login';
            document.getElementById('tab-login').classList.toggle('active', isLogin);
            document.getElementById('tab-signup').classList.toggle('active', !isLogin);
            document.getElementById('login-form').style.display = isLogin ? 'flex' : 'none';
            document.getElementById('signup-form').style.display = isLogin ? 'none' : 'flex';
            document.getElementById('error-box').style.display = 'none';
        }

        function showError(msg) {
            const el = document.getElementById('error-box');
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged,
                 createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut }
            from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBu9O9TabFvGXJSTqaQvjTuwetQ7lafmA8",
            authDomain: "studypilot-492413.firebaseapp.com",
            projectId: "studypilot-492413",
            storageBucket: "studypilot-492413.firebasestorage.app",
            messagingSenderId: "445634431006",
            appId: "1:445634431006:web:34ffc38e4aaeb65847060f",
            measurementId: "G-0W1N04FEB8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Detect if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-view').style.display = 'none';
                document.getElementById('logged-in-view').style.display = 'flex';
                document.getElementById('logged-in-email').textContent = user.displayName || user.email;
            }
        });

        // Log Out from this page
        document.getElementById('logout-link-btn').onclick = () => {
            signOut(auth).then(() => window.location.reload());
        };

        // Google Sign-in
        document.getElementById('google-btn').addEventListener('click', (e) => {
            e.preventDefault();
            signInWithPopup(auth, provider)
                .then(() => window.location.href = 'app.html')
                .catch(err => showError(err.message));
        });

        // Email Login
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass  = document.getElementById('login-password').value;
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => window.location.href = 'app.html')
                .catch(err => showError(err.message));
        });

        // Email Signup
        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email   = document.getElementById('signup-email').value;
            const pass    = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            if (pass !== confirm) { showError("Passwords do not match!"); return; }
            if (pass.length < 6)  { showError("Password must be at least 6 characters."); return; }
            createUserWithEmailAndPassword(auth, email, pass)
                .then(() => window.location.href = 'app.html')
                .catch(err => showError(err.message));
        });
    </script>
</body>
</html>
